name: Crest
options:
  bundleIdPrefix: com.crest
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16.4"
  generateEmptyDirectories: true

packages:
  Adhan:
    url: https://github.com/batoulapps/adhan-swift
    branch: main
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    exactVersion: "2.9.1"

settings:
  base:
    SWIFT_VERSION: "6"
    MACOSX_DEPLOYMENT_TARGET: "15.0"

targets:
  Crest:
    type: application
    platform: macOS
    sources:
      - path: Crest
        excludes:
          - ".agents/**"
          - ".claude/**"
          - ".github/**"
          - "crest/**"
          - "docs/**"
    dependencies:
      - package: Adhan
      - package: Sparkle
    info:
      path: Crest/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSUIElement: true
        SUFeedURL: "https://saiftheboss7.github.io/crest/appcast.xml"
        SUPublicEDKey: "dmLpeNDITjP64vebENwUM/smrAPaX3Da3xYfNQ9fSu8="
        NSCalendarsFullAccessUsageDescription: "Crest needs access to your calendars to show upcoming events and meeting links."
        NSCalendarsUsageDescription: "Crest needs access to your calendars to show upcoming events and meeting links."
        NSLocationUsageDescription: "Crest needs your location to calculate accurate prayer times."
        NSLocationWhenInUseUsageDescription: "Crest needs your location to calculate accurate prayer times."
    entitlements:
      path: Crest/Crest.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.crest.app
        MARKETING_VERSION: "0.0.6"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: Crest/Info.plist
        CODE_SIGN_ENTITLEMENTS: Crest/Crest.entitlements
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        COMBINE_HIDPI_IMAGES: YES
      configs:
        Release:
          # Universal binary (arm64 + x86_64) for the released DMG, so the
          # same artifact runs natively on every supported Mac.
          ONLY_ACTIVE_ARCH: NO
          # Required for any future Apple notarisation; harmless with ad-hoc
          # signing because Sparkle's EdDSA signature is what verifies updates.
          ENABLE_HARDENED_RUNTIME: YES
          # Strip private + Swift symbols from the released binary to shrink
          # the DMG and avoid leaking implementation details.
          STRIP_INSTALLED_PRODUCT: YES
          STRIP_SWIFT_SYMBOLS: YES
          DEAD_CODE_STRIPPING: YES
          DEPLOYMENT_POSTPROCESSING: YES
          SWIFT_OPTIMIZATION_LEVEL: -O
          SWIFT_COMPILATION_MODE: wholemodule
          GCC_OPTIMIZATION_LEVEL: s
        Debug:
          ONLY_ACTIVE_ARCH: YES
          SWIFT_OPTIMIZATION_LEVEL: -Onone

  CrestTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: CrestTests
    dependencies:
      - target: Crest
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.crest.app.tests
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Crest.app/Contents/MacOS/Crest"
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        SWIFT_VERSION: "6"
        GENERATE_INFOPLIST_FILE: YES

  CrestUITests:
    type: bundle.ui-testing
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: CrestUITests
    dependencies:
      - target: Crest
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.crest.app.uitests
        TEST_TARGET_NAME: Crest
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        SWIFT_VERSION: "6"
        GENERATE_INFOPLIST_FILE: YES

schemes:
  Crest:
    build:
      targets:
        Crest: all
        CrestTests: [test]
        CrestUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - CrestTests
        - CrestUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
